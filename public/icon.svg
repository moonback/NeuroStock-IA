<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="50%" stop-color="#070b13" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    <linearGradient id="laserGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0" />
      <stop offset="50%" stop-color="#a5b4fc" stop-opacity="1" />
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  <rect x="8" y="8" width="496" height="496" rx="120" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="4" />

  <!-- Barcode Visual -->
  <g transform="translate(136, 120)" fill="rgba(255, 255, 255, 0.15)">
    <rect x="0" y="0" width="16" height="180" rx="4" />
    <rect x="32" y="0" width="8" height="180" rx="2" />
    <rect x="56" y="0" width="24" height="180" rx="4" />
    <rect x="96" y="0" width="16" height="180" rx="4" />
    <rect x="128" y="0" width="8" height="180" rx="2" />
    <rect x="152" y="0" width="32" height="180" rx="6" />
    <rect x="200" y="0" width="16" height="180" rx="4" />
    <rect x="224" y="0" width="16" height="180" rx="4" />
  </g>

  <!-- Box / Package Graphic -->
  <g transform="translate(186, 160)" filter="url(#glow)">
    <!-- Main Box Frame -->
    <path d="M70 20 L140 55 L140 135 L70 170 L0 135 L0 55 Z" fill="none" stroke="url(#accentGrad)" stroke-width="12" stroke-linejoin="round" />
    <!-- Box Inner Lines -->
    <path d="M70 20 L70 170" fill="none" stroke="url(#accentGrad)" stroke-width="6" />
    <path d="M0 55 L70 90 L140 55" fill="none" stroke="url(#accentGrad)" stroke-width="8" stroke-linejoin="round" />
  </g>

  <!-- Scanning Laser Line -->
  <g transform="translate(60, 250)">
    <rect x="0" y="0" width="392" height="6" rx="3" fill="url(#laserGrad)" filter="url(#glow)" />
  </g>
</svg>
